MaintainerNotes: |-
  Current Android app id: dev.hyphen.android.

  Runtime dependencies are Android platform APIs and Kotlin stdlib only; JUnit
  is test-only. No analytics, ads, crash-reporting, cloud messaging, or account
  SDK is present in the Android app module at this draft point.

  Expected F-Droid build root is apps/android, where the Gradle wrapper,
  settings.gradle.kts, and app module live.

  HYP-M5-004 produced unsigned dry-run APK/AAB artifacts but release/upload
  signing remains blocked by missing external keystore material. Decide whether
  F-Droid will use F-Droid signing only or reproducible developer-signed
  verification before enabling this metadata.

  Formal root LICENSE files and SPDX sweeps remain release-readiness blockers
  even though ADR-0005 selects MPL-2.0 for app source.
