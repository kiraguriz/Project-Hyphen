Name: Project Hyphen
Summary: Local-first Android companion for macOS
Description: |-
  Project Hyphen is an open-source Android companion for the Hyphen macOS
  menu-bar app.

  It pairs devices over the local network, pins peer fingerprints, and uses
  local TLS for notification continuity, text/link handoff, and file transfer.
  It does not require an account or cloud relay.

  Pre-alpha limitations: Android compatibility coverage, foreground service
  release behavior, public signing policy, and final beta evidence are still in
  progress. This metadata is disabled until the first public F-Droid-ready
  release is tagged.
  .
